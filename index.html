<meta charset="UTF-8">

<title>Chat with Suman</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0e0e0e; --surface: #1a1a1a; --bubble-them: #242424; --bubble-me: #2563eb; --text: #f0f0f0; --text-muted: #888; --border: rgba(255,255,255,0.07); --accent: #2563eb; --online: #22c55e; --radius: 18px; --font: 'DM Sans', sans-serif; }

  .header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: white; flex-shrink: 0; position: relative; }

  .header-info h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-info p { font-size: 12px; color: var(--online); }
  .messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 0; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.me { flex-direction: row-reverse; }
  .bubble { max-width: 72%; padding: 9px 13px; border-radius: var(--radius); font-size: 14.5px; line-height: 1.45; word-break: break-word; }
  .msg-row.them .bubble { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 5px; }
  .msg-row.me .bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 5px; }
  .msg-row.them + .msg-row.them .bubble { border-top-left-radius: 5px; }
  .msg-row.me + .msg-row.me .bubble { border-top-right-radius: 5px; }
  .time { font-size: 10px; color: var(--text-muted); margin: 2px 4px; align-self: flex-end; }
  .typing-row { display: flex; align-items: center; gap: 8px; }
  .typing-bubble { background: var(--bubble-them); border-radius: var(--radius); border-bottom-left-radius: 5px; padding: 12px 16px; display: flex; gap: 4px; align-items: center; }
