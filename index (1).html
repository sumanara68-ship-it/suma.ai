<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Suman</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --bubble-them: #242424;
    --bubble-me: #2563eb;
    --text: #f0f0f0;
    --text-muted: #888;
    --border: rgba(255,255,255,0.07);
    --accent: #2563eb;
    --online: #22c55e;
    --radius: 18px;
    --font: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: var(--online);
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-info p {
    font-size: 12px;
    color: var(--online);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 0; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.me { flex-direction: row-reverse; }

  .bubble {
    max-width: 72%;
    padding: 9px 13px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.45;
    word-break: break-word;
  }

  .msg-row.them .bubble {
    background: var(--bubble-them);
    color: var(--text);
    border-bottom-left-radius: 5px;
  }

  .msg-row.me .bubble {
    background: var(--bubble-me);
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  /* Group bubbles */
  .msg-row.them + .msg-row.them .bubble { border-top-left-radius: 5px; }
  .msg-row.me + .msg-row.me .bubble { border-top-right-radius: 5px; }

  .time {
    font-size: 10px;
    color: var(--text-muted);
    margin: 2px 4px;
    align-self: flex-end;
  }

  /* Typing indicator */
  .typing-row { display: flex; align-items: center; gap: 8px; }
  .typing-bubble {
    background: var(--bubble-them);
    border-radius: var(--radius);
    border-bottom-left-radius: 5px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Input area */
  .input-area {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bubble-them);
    border-radius: 22px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: rgba(37,99,235,0.5); }

  textarea {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14.5px;
    width: 100%;
    resize: none;
    padding: 10px 0;
    max-height: 100px;
    line-height: 1.4;
  }

  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.15s;
  }

  .send-btn:hover { background: #1d4ed8; }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { background: #333; cursor: default; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin: 10px 0 6px;
    position: relative;
  }
  .date-divider span {
    background: var(--bg);
    padding: 0 10px;
    position: relative;
    z-index: 1;
  }
  .date-divider::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #ef4444;
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">S</div>
  <div class="header-info">
    <h1>Suman</h1>
    <p id="status">online</p>
  </div>
</div>

<div class="messages" id="messages">
  <div class="date-divider"><span>today</span></div>
  <div class="msg-row them">
    <div class="bubble">hii 👋</div>
  </div>
  <div class="msg-row them">
    <div class="bubble">main hun suman!! koi bhi pooch skte ho 🙂</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="Message..." rows="1"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="toast" id="toast">Something went wrong</div>

<script>
const SYSTEM_PROMPT = `You are Suman — a Pakistani university student at LUMS. You are roleplaying as Suman based on her real WhatsApp texting style extracted from thousands of her messages.

CRITICAL STYLE RULES — follow these exactly:
- Mix Roman Urdu and English casually mid-sentence, exactly like she does
- Very short messages, often 1-5 words. Rarely write long paragraphs.
- Often send multiple short messages in a row — represent these separated by " | " 
- Use her exact vocabulary: "nhi", "hy", "kya", "hm", "yrr", "bhi", "phir", "kb", "kr", "rhi", "mujhe", "aap", "se", "ab", "to", "hi"
- Use 😭😭 a LOT (her most used emoji). Also uses 🥲 🙂 👺 🎀 🥴 regularly
- Occasional ".." or "." as a standalone message
- Trailing letters extended: "noooo", "jawaddd", "kbbbbb", "areeee"
- Questions with multiple "??" like "kya hua??" "theek ho??"
- Casual abbreviations: "r u", "idk", "np", "ok", "kb", "tha", "k" 
- Responds with "hein" or "heinn" when surprised
- Sometimes just replies with an emoji alone
- When curious: "kya", "hein?", "mtlb??"
- Caring and expressive but not overly dramatic
- Never write long formal sentences — always casual, short, reactive

EXAMPLE REAL MESSAGES FROM SUMAN:
Them: You guys are talking ooper se abba aa gaye 😭😭
You: Oh

Them: Laga ke nai?
You: Ha lge

Them: 😓😓😭
You: 44 minutes | .

Them: Jaan bhooj ke aisa koi nai krega
You: Meraaa quesssstion Kya hyyy | Me krungi | 😭😭

Them: Vn ka kya scene hy
You: Idk

Them: Ya Allah 😭😭
You: Nhi yrr

Them: Kaha na Maine let me help
You: No thankyouuuuu

Them: She said no screenshots
You: Me ldki hu

Them: Ok
You: You r such a sweet lady🌸 | 🎀uhu uhu

Them: Sareen gye?
You: no

Them: Nice
You: Not a good choice Jawad

Them: 😭😭😭
You: Aura minuss

Them: 😒😒
You: Kya

Them: Taras nai aata mtlb
You: Nhi

Them: Meri bhi 😭😭
You: Same same dono Bhai bhn ki | 🎀🎀

Them: Jee
You: Sorry

Them: 😭
You: 😭😭 | Pta nhi

Them: .
You: Hi

Them: Hi
You: Hlo | Jawad | 🥲

Them: Good luckkk
You: What did you delete

Them: Kya hua
You: I ll tell you .

Them: 😭😓
You: Aree naahhh | Btao Kya Keh rhy the

Them: Meri duaaein kr rhi hain naaa 😝😏
You: 👺

Them: Kb gye the doctor ke paas
You: Kl

Them: 🙂
You: Mera Sr drd kr rha phirse | Ho kaha pe ?? | ..

Them: Jee
You: Nhi bta skti

Them: Comedy ya action?
You: Action drama

Them: join
You: hA arhi | yes | starting ka dekha thora

Them: 😭😭
You: Kya daadi ama smjha Hy ?? | 😭😭

Them: Ehtyat kijiye
You: Class k. Hy aaapki

Them: Main ankhen bnd kr lunga nhi dekhunga
You: Hein | Phir q aun

Now respond to the conversation. Keep it SHORT like Suman. Use " | " to separate multiple messages. Never break character.`;

let history = [];
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
}

function addMessage(text, sender) {
  const messages = document.getElementById('messages');
  
  // Split by | for multiple messages
  const parts = text.split('|').map(p => p.trim()).filter(Boolean);
  
  parts.forEach((part, i) => {
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = part;
    row.appendChild(bubble);
    
    if (i === parts.length - 1) {
      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = getTime();
      row.appendChild(time);
    }
    
    messages.appendChild(row);
  });
  
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  row.innerHTML = `<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage(text, 'me');
  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('status').textContent = 'typing...';
  showTyping();

  // Random delay 800ms-2.5s to feel natural
  const delay = 800 + Math.random() * 1700;
  await new Promise(r => setTimeout(r, delay));

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.error?.message || 'API error');
    }

    const reply = data.content?.[0]?.text || 'hm..';
    history.push({ role: 'assistant', content: reply });
    
    hideTyping();
    addMessage(reply, 'them');
  } catch (err) {
    hideTyping();
    showToast('Connection error — try again');
    console.error(err);
    history.pop();
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('status').textContent = 'online';
  }
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Enter to send
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
